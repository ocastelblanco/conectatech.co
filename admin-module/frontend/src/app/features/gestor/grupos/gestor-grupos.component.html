<p-toast />

<div class="space-y-5">
  <div class="flex items-start justify-between">
    <div>
      <h2 class="text-lg font-heading font-bold text-cnt-midnight m-0">Grupos</h2>
      <p class="text-sm text-gray-500 mt-1 m-0">Grupos de tu organización. Se crean en Moodle al activar el primer pin.</p>
    </div>
    <p-button label="Nuevo grupo" icon="pi pi-plus" (onClick)="abrirCrear()" />
  </div>

  @if (loading()) {
    <div class="flex items-center justify-center py-12 text-gray-400">
      <i class="pi pi-spin pi-spinner mr-2 text-xl"></i>
      <span class="text-sm">Cargando grupos...</span>
    </div>
  }

  @if (!loading()) {
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
      <p-table [value]="grupos()" class="text-sm">
        <ng-template #header>
          <tr>
            <th>Nombre</th>
            <th>Estado en Moodle</th>
          </tr>
        </ng-template>
        <ng-template #body let-grupo>
          <tr>
            <td class="font-medium text-cnt-midnight">{{ grupo.name }}</td>
            <td>
              @if (grupo.moodle_group_id) {
                <p-tag value="Creado en Moodle" severity="success" />
              } @else {
                <p-tag value="Pendiente (se crea al activar)" severity="secondary" />
              }
            </td>
          </tr>
        </ng-template>
        <ng-template #emptymessage>
          <tr>
            <td colspan="2" class="text-center text-gray-400 py-8">
              <i class="pi pi-users text-3xl mb-2 block"></i>
              No hay grupos. Crea el primero.
            </td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  }
</div>

<p-dialog header="Nuevo grupo"
          [visible]="dialogVisible()"
          (visibleChange)="$event ? null : dialogVisible.set(false)"
          [modal]="true"
          [style]="{ width: '380px' }">
  <div class="flex flex-col gap-1 pt-1">
    <label class="text-sm font-medium text-gray-700">Nombre del grupo</label>
    <input pInputText
           class="w-full"
           placeholder="Ej: Grado 6A"
           [ngModel]="nuevoNombre()"
           (ngModelChange)="nuevoNombre.set($event)" />
  </div>
  <ng-template #footer>
    <p-button label="Cancelar" severity="secondary" [text]="true" (onClick)="dialogVisible.set(false)" />
    <p-button label="Crear" icon="pi pi-plus" [loading]="saving()" (onClick)="guardar()" />
  </ng-template>
</p-dialog>
