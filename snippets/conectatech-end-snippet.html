<script>
  /********* AÑADE CLASES AL <BODY> DE UN CURSO SEGÚN EL ÁRBOL CURRICULAR - GENERAL ***********/
  /* CT:MAP:START */
  const CT_COURSES = { "13": ["cosmovision-cristiana", "ciencias-naturales"], "14": ["cosmovision-cristiana", "matematicas"], "18": ["planeta-lector", "planeta-lector"] };
  /* CT:MAP:END */
  const bodyElement = document.querySelector("body");
  if (bodyElement !== null) {
    bodyElement.classList.forEach(clase => {
      const m = clase.match(/^course-(\d+)$/);
      if (m && CT_COURSES[m[1]]) bodyElement.classList.add(...CT_COURSES[m[1]]);
    });
  }

  /********** DEFINE EL TIPO DE PROYECTO ********/
  let proyecto = null;
  if (bodyElement.classList.contains('planeta-lector')) proyecto = 'planeta-lector';
  if (bodyElement.classList.contains('cosmovision-cristiana')) proyecto = 'cosmovision-cristiana';

  /********* MODIFICA EL HEADER DE CADA CURSO ***********/
  const courseHeaderImageElement = document.querySelector("#courseheaderimage");
  if (courseHeaderImageElement !== null) {
    const tituloCursoElement = courseHeaderImageElement.querySelector(".page-header-headings > *");
    if (proyecto == 'cosmovision-cristiana') generaDivGrado(tituloCursoElement, courseHeaderImageElement);
    if (proyecto == 'planeta-lector') generaDivGrado(tituloCursoElement, courseHeaderImageElement, false);
  }

  /********* MODIFICA LA CARD DE CADA CURSO (MIS CURSOS) ***********/
  function procesarCards() {
    // Seleccionar todas las cards de curso dentro de .card-grid (para limitar)
    const cardGrids = document.querySelectorAll('.card-grid');
    if (!cardGrids.length) return;
    cardGrids.forEach(grid => {
      const cards = grid.querySelectorAll('.card.course-card');
      cards.forEach(cardCurso => {
        const tituloCursoElement = cardCurso.querySelector(".coursename span.multiline > span:last-of-type") ?? cardCurso.querySelector(".coursename");
        const cardCursoTop = cardCurso.querySelector(".card-img-top");
        if (tituloCursoElement) generaDivGrado(tituloCursoElement, cardCursoTop);
      });
    });
  }
  // Observar cambios en el DOM para detectar cuando se agregan cards
  const observer = new MutationObserver(function (mutations) {
    procesarCards();
  });
  // Iniciar observación en el body, pero filtrando por si hay un contenedor más específico
  // Observamos todo el documento, pero podemos restringir a un contenedor principal si se desea
  const targetNode = document.querySelector('body');
  if (targetNode) {
    observer.observe(targetNode, {
      childList: true,
      subtree: true
    });
  }

  // Ejecutar una vez al inicio por si las cards ya están presentes
  procesarCards();

  /********* FUNCIONES PARA COSMOVISIÓN CRISTIANA ***********/
  function extraeMateriaCurso(nombre) {
    [materia, grado] = nombre.split(' - ');
    if (materia.match(/\n/g)) materia = materia.split('\n')[1];
    if (materia && grado && grado.substr(0, 1).match(/\d/g)) {
      const salida = [materia.trim(), grado.trim()];
      return salida;
    }
    return null;
  }

  function generaDivGrado(tituloCursoElement, padre, addGrado = true) {
    if (padre.querySelector('.grado')) return;
    const tituloCurso = tituloCursoElement.innerText;
    if (!tituloCurso) return;
    const datos = extraeMateriaCurso(tituloCurso);
    if (datos) {
      [materia, grado] = datos;
      tituloCursoElement.innerText = materia;
      if (addGrado) {
        const gradoElement = document.createElement("div");
        gradoElement.innerText = grado;
        gradoElement.classList.add("grado");
        padre.prepend(gradoElement);
      }
    }
  }
  // ************* ConectaTech — Presaberes Interactive Quiz v1.0 ****************************
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('[data-quiz-block]').forEach(function (block) {
      block.addEventListener('change', function (e) {
        if (!e.target.matches('input[type="radio"]')) return;
        var selected = e.target.closest('.respuesta-option');
        var feedback = block.querySelector('.retroalimentacion');
        var allOptions = block.querySelectorAll('.respuesta-option');
        var type = selected.dataset.type;
        var feedbackText = selected.dataset.feedback;
        allOptions.forEach(function (opt) {
          opt.classList.remove('bg-success', 'bg-danger', 'border-success', 'border-danger', 'text-white');
          opt.classList.add('border-light');
          opt.querySelector('input').disabled = true;
          opt.querySelector('label').style.cursor = 'default';
        });
        selected.classList.remove('border-light');
        if (type === 'correct') {
          selected.classList.add('bg-success', 'border-success', 'text-white');
        } else {
          selected.classList.add('bg-danger', 'border-danger', 'text-white');
        }
        selected.querySelectorAll('label, span').forEach(function (el) { el.style.color = '#fff'; });
        var emoji = type === 'correct' ? '✅' : '❌';
        var alertType = type === 'correct' ? 'success' : 'warning';
        var label = type === 'correct' ? '¡Excelente!' : 'Incorrecto';
        feedback.innerHTML =
          '<div class="alert alert-' + alertType + ' d-flex align-items-start shadow-sm" role="alert">' +
          '<div class="mr-3 mt-1" style="font-size:1.5rem">' + emoji + '</div>' +
          '<div><strong>' + label + '</strong>' +
          '<p class="mb-0 mt-1">' + feedbackText + '</p></div></div>';
        feedback.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      });
    });
  });
</script>
